<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warrior Color Customizer</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="container">
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
        </div>
        <div id="controls">
            <h1>Warrior Customizer</h1>
            <p>Change the colors of the warrior's gear. Each control targets a specific color channel from the original image.</p>
            <div class="slider-control" style="display: none;">
                <label for="threshold-slider">Color Match Leniency</label>
                <input type="range" id="threshold-slider" min="0.0" max="1.0" step="0.01" value="1.0">
                <span id="threshold-value">1.00</span>
            </div>
            <div class="color-control">
                <label for="color-face">Face/Skin</label>
                <div class="input-group">
                    <input type="color" id="color-face" value="#FFFFFF">
                    <input type="range" class="threshold-slider" id="threshold-face" min="0.0" max="1.0" step="0.01" value="1.0">
                    <span class="threshold-value" id="threshold-value-face">1.00</span>
                </div>
            </div>
            <div class="color-control">
                <label for="color-armour">Armour/Weapon</label>
                <div class="input-group">
                    <input type="color" id="color-armour" value="#FF0000">
                    <input type="range" class="threshold-slider" id="threshold-armour" min="0.0" max="1.0" step="0.01" value="1.0">
                    <span class="threshold-value" id="threshold-value-armour">1.00</span>
                </div>
            </div>
            <div class="color-control">
                <label for="color-trim">Trim</label>
                <div class="input-group">
                    <input type="color" id="color-trim" value="#00FF00">
                    <input type="range" class="threshold-slider" id="threshold-trim" min="0.0" max="1.0" step="0.01" value="1.0">
                    <span class="threshold-value" id="threshold-value-trim">1.00</span>
                </div>
            </div>
            <div class="color-control">
                <label for="color-hair">Hair</label>
                <div class="input-group">
                    <input type="color" id="color-hair" value="#FF0000">
                    <input type="range" class="threshold-slider" id="threshold-hair" min="0.0" max="1.0" step="0.01" value="1.0">
                    <span class="threshold-value" id="threshold-value-hair">1.00</span>
                </div>
            </div>
            <div class="color-control">
                <label for="color-outline">Outline</label>
                <div class="input-group">
                    <input type="color" id="color-outline" value="#000000">
                    <input type="range" class="threshold-slider" id="threshold-outline" min="0.0" max="1.0" step="0.01" value="1.0">
                    <span class="threshold-value" id="threshold-value-outline">1.00</span>
                </div>
            </div>
            <div class="toggle-control">
                <label for="clean-pixels-toggle">Pixel Cleanup</label>
                <input type="checkbox" id="clean-pixels-toggle" checked>
            </div>
            <div id="lighting-controls">
                <h2>Lighting Effects</h2>
                <div class="toggle-control no-border">
                    <label for="lighting-toggle">Enable Lighting</label>
                    <input type="checkbox" id="lighting-toggle" checked>
                </div>
                <div class="color-control">
                    <label for="light-color">Light Color</label>
                    <input type="color" id="light-color" value="#FFFFFF">
                </div>
                <div class="slider-control">
                    <label for="light-intensity">Light Intensity</label>
                    <input type="range" id="light-intensity" min="0.0" max="2.0" step="0.01" value="0.5">
                    <span id="light-intensity-value">0.50</span>
                </div>
                 <div class="slider-control">
                    <label for="light-dir-x">Light Dir X</label>
                    <input type="range" id="light-dir-x" min="-1.0" max="1.0" step="0.01" value="-0.5">
                    <span id="light-dir-x-value">-0.50</span>
                </div>
                 <div class="slider-control">
                    <label for="light-dir-y">Light Dir Y</label>
                    <input type="range" id="light-dir-y" min="-1.0" max="1.0" step="0.01" value="0.5">
                    <span id="light-dir-y-value">0.50</span>
                </div>
                <div class="color-control">
                    <label for="rim-color">Rim Light Color</label>
                    <input type="color" id="rim-color" value="#87CEEB">
                </div>
                 <div class="slider-control">
                    <label for="rim-intensity">Rim Intensity</label>
                    <input type="range" id="rim-intensity" min="0.0" max="5.0" step="0.01" value="1.5">
                    <span id="rim-intensity-value">1.50</span>
                </div>
                 <div class="slider-control">
                    <label for="rim-power">Rim Power</label>
                    <input type="range" id="rim-power" min="0.1" max="10.0" step="0.1" value="2.0">
                    <span id="rim-power-value">2.0</span>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="main.js"></script>

</body>
</html>
